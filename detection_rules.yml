# MITRE ATT&CK Detection Rules (SIGMA Format)
# Author: Shubham Singh | github.com/shubhamsingh99
# Coverage: T1059, T1003, T1053, T1566, T1110, T1021
# Tested on: Chronicle SIEM, Splunk
